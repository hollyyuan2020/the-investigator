! =====================================================================
! Edge firewall - HARDENED outbound rules
! Principle: default-deny egress, explicit allow-list, log everything notable
! Replaces the original "allow all outbound" config that permitted the
! C2 beacon to 185.220.101.47:8443 and SSH brute force from the internet.
! Adjust object names (subnets/hosts) to match your environment.
! =====================================================================

! ---------------------------------------------------------------------
! Object definitions (edit these to fit your network)
! ---------------------------------------------------------------------
! MGMT_SUBNET   = 10.0.0.0 0.0.0.7    (admin/bastion hosts only, /29)
! INTERNAL      = 10.0.0.0 0.0.0.255  (internal user subnet, /24)
! DNS_SERVERS   = your approved resolvers

! ---------------------------------------------------------------------
! 1. Remote admin (SSH): restrict to the management subnet only.
!    Fixes: "permit tcp any any eq 22" (open to the whole internet).
! ---------------------------------------------------------------------
permit tcp 10.0.0.0 0.0.0.7 10.0.0.0 0.0.0.255 eq 22 log   ! SSH: mgmt -> internal only

! ---------------------------------------------------------------------
! 2. Internal egress: explicit allow-list instead of "permit ip ... any".
!    Fixes: "permit ip 10.0.0.0 0.0.0.255 any" (unrestricted outbound
!    that let 10.0.0.37 beacon out on tcp/8443).
! ---------------------------------------------------------------------
permit udp 10.0.0.0 0.0.0.255 host <DNS_SERVER> eq 53        ! DNS (to approved resolvers)
permit tcp 10.0.0.0 0.0.0.255 host <DNS_SERVER> eq 53        ! DNS over TCP
permit tcp 10.0.0.0 0.0.0.255 any eq 80  log                 ! HTTP  (log for visibility)
permit tcp 10.0.0.0 0.0.0.255 any eq 443 log                 ! HTTPS (log for visibility)

! ---------------------------------------------------------------------
! 3. Explicitly block non-standard / high-risk outbound ports.
!    Catches C2 channels like tcp/8443 before the default deny, with a
!    distinct log tag so beaconing stands out in review (feeds hunt.py).
! ---------------------------------------------------------------------
deny tcp 10.0.0.0 0.0.0.255 any eq 8443 log                 ! block C2-style non-standard TLS
deny tcp 10.0.0.0 0.0.0.255 any range 1024 65535 log        ! block other ephemeral-port egress

! ---------------------------------------------------------------------
! 4. Default deny - now meaningful because the permits above are tight.
!    Everything not explicitly allowed is dropped and logged.
! ---------------------------------------------------------------------
deny ip any any log                                          ! default-deny, logged
